<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新闻 | 瑞青中文学校预览</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell site-shell-page">
      <header class="topbar">
        <a class="brand" href="index.html">
          <span class="brand-mark">瑞青</span>
          <span class="brand-copy">
            <strong>Kinaskolan</strong>
            <small>斯德哥尔摩瑞青中文学校</small>
          </span>
        </a>
        <button class="nav-toggle" type="button" aria-label="打开菜单" aria-expanded="false">
          <span></span>
          <span></span>
        </button>
        <nav class="nav">
          <a class="active" href="news.html">新闻</a>
          <a href="about.html">瑞青简介</a>
          <a href="students.html">学生作品</a>
          <a href="hsk.html">汉考信息</a>
        </nav>
      </header>

      <main class="page-layout">
        <section class="page-hero">
          <p class="eyebrow">News Preview</p>
          <h1>新闻页会用更明确的层次，承接通知、活动和招生信息。</h1>
          <p>
            后台上线后，这里将由客户自己发布内容。当前预览重点是版式和栏目组织方式。
          </p>
        </section>

        <section class="stack-grid">
          <article class="panel-card">
            <span>学校通知</span>
            <h2>重要通知将支持置顶</h2>
            <p>适合假期安排、开学通知、课程调整、报名提醒等信息。</p>
          </article>
          <article class="panel-card">
            <span>活动新闻</span>
            <h2>活动报道会更像“学校成果展示”</h2>
            <p>不再埋在多层菜单里，而是直接通过图片和摘要提升可读性。</p>
          </article>
          <article class="panel-card">
            <span>招生动态</span>
            <h2>招生信息独立可见</h2>
            <p>方便家长快速看到当季课程、开班时间和报名入口。</p>
          </article>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>

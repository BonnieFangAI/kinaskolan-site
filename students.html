  <body>
    <div class="site-shell site-shell-page">
      <header class="topbar">
        <a class="brand" href="index.html">
          <span class="brand-mark">瑞青</span>
          <span class="brand-copy">
            <strong>Kinaskolan</strong>
            <small>斯德哥尔摩瑞青中文学校</small>
          </span>
        </a>
        <button class="nav-toggle" type="button" aria-label="打开菜单" aria-expanded="false">

        <nav class="nav">
          <a href="news.html">新闻</a>

        </nav>

      <main class="page-layout">
        <section class="page-hero">
          <p class="eyebrow">Student Showcase</p>
          <h1>学生作品页会把“成果感”做出来，而不是只是一串旧文章链接。</h1>
          <p>适合承载作品展示、朗诵比赛、书法比赛和课外活动等学校亮点内容。</p>
        </section>

        <section class="stack-grid">
          <article class="panel-card">
            <span>作品展示</span>
            <h2>学生作品可以图文并用</h2>
            <p>后续能扩成图集、专题页或按年级分组的作品展示形式。</p>
          </article>
          <article class="panel-card">
            <span>朗诵 / 书法比赛</span>
            <h2>比赛内容不再埋在深层导航</h2>
            <p>比赛介绍、精彩瞬间、获奖内容都可做成专题式卡片。</p>
          </article>
          <article class="panel-card">
            <span>课外活动</span>
            <h2>把学校活力直接展示给家长看</h2>
            <p>活动新闻和学生成果互相联动，形成更有温度的学校形象。</p>
          </article>
        </section>
      </main>
